name: Publish

on:
  push:
    tags:
      - 'v*'
  # Allow manual dispatch from the Actions UI / `gh workflow run` so the
  # workflow can be re-driven without retagging — e.g. when one workspace's
  # publish failed but the other already shipped.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Trusted publishing requires npm 11.5.1+; Node 20 ships with npm 10.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Each publish step is idempotent: skip when the current version is
      # already on npm. Lets a partial-failure rerun complete the missing
      # workspace without erroring on the one that already shipped.
      - name: Publish theme-sdk
        run: |
          version=$(node -p "require('./packages/theme-sdk/package.json').version")
          if npm view "@getwajiha/theme-sdk@${version}" version >/dev/null 2>&1; then
            echo "@getwajiha/theme-sdk@${version} already published — skipping."
          else
            npm publish --workspace=packages/theme-sdk --access=public --provenance
          fi

      - name: Publish CLI
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          if npm view "@getwajiha/cli@${version}" version >/dev/null 2>&1; then
            echo "@getwajiha/cli@${version} already published — skipping."
          else
            npm publish --workspace=packages/cli --access=public --provenance
          fi
